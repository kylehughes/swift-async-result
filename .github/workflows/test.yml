name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  get-environment-details:
    strategy:
      matrix:
        include:
          - os: macos-26
            xcode: '26.2'
    name: Get Environment Details (Xcode ${{ matrix.xcode }})
    runs-on: ${{ matrix.os }}
    steps:
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_${{ matrix.xcode }}.app

      - name: Print OS SDKs
        run: xcodebuild -version -sdk

      - name: Print simulators
        run: |
          xcrun simctl delete unavailable
          xcrun simctl list

  test:
    needs: get-environment-details
    strategy:
      matrix:
        include:
          - os: macos-26
            xcode: '26.2'
            platform: iOS
            destination: "name=iPhone 17 Pro"
            sdk: iphonesimulator
          - os: macos-26
            xcode: '26.2'
            platform: tvOS
            destination: "name=Apple TV 4K (3rd generation)"
            sdk: appletvsimulator
          - os: macos-26
            xcode: '26.2'
            platform: visionOS
            destination: "name=Apple Vision Pro"
            sdk: xrsimulator
          - os: macos-26
            xcode: '26.2'
            platform: watchOS
            destination: "name=Apple Watch Ultra 3 (49mm)"
            sdk: watchsimulator
          - os: macos-26
            xcode: '26.2'
            platform: macOS
    name: Test ${{ matrix.platform }} (Xcode ${{ matrix.xcode }})
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_${{ matrix.xcode }}.app

      - name: Run tests (Xcode)
        if: matrix.platform != 'macOS'
        run: |
          set -o pipefail
          xcodebuild clean test -scheme swift-async-result -sdk ${{ matrix.sdk }} -destination "${{ matrix.destination }}" -configuration Debug -enableCodeCoverage YES | xcpretty -c

      - name: Run tests (Swift)
        if: matrix.platform == 'macOS'
        run: swift test
